<!doctype html>

  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyShows Web Scrobbler</title>
    <link rel="stylesheet" href="popup.css" />

    <header>

        <span class="brand-mark">M</span>

    <footer>
